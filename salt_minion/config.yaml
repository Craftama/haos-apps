---
name: "Salt Minion"
description: "SaltStack minion that connects Home Assistant to a Salt master"
version: "0.0.3"
slug: "salt_minion"
image: "ghcr.io/craftama/salt_minion/{arch}"
init: false
arch:
  - aarch64
  - amd64
host_network: true
host_pid: true
host_dbus: true
privileged:
  - SYS_ADMIN
  - SYS_PTRACE
  - SYS_RAWIO
  - NET_ADMIN
  - DAC_READ_SEARCH

options:
  master: ""
  minion_id: ""
  master_port: 4506
  publish_port: 4505
  log_level: "info"
schema:
  master: str
  minion_id: str?
  master_port: port
  publish_port: port
  log_level: list(garbage|trace|debug|info|warning|error|critical)
