---
name: "Salt Minion"
description: "Salt automates the management and configuration of infrastructure and applications at scale"
version: "3008.1"
slug: "salt_minion"
image: "ghcr.io/craftama/salt_minion/{arch}"
init: false
arch:
  - aarch64
  - amd64
host_network: true
host_pid: true
host_dbus: true
privileged:
  - SYS_ADMIN
  - SYS_PTRACE
  - SYS_RAWIO
  - NET_ADMIN
  - DAC_READ_SEARCH

options:
  master: ""
  minion_id: ""
  master_port: 4506
  publish_port: 4505
  log_level: "info"
  minion_private_key: ""
  minion_public_key: ""
schema:
  master: str
  minion_id: str?
  master_port: port
  publish_port: port
  log_level: list(garbage|trace|debug|info|warning|error|critical)
  minion_private_key: str?
  minion_public_key: str?
