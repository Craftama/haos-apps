---
configuration:
  metrics_url:
    name: Metrics Endpoint URL
    description: Prometheus remote_write URL (Mimir / Grafana Cloud). Maps to METRICS_PRIMARY_URL.
  metrics_tenant:
    name: Metrics Tenant (Org ID)
    description: Sent as the X-Scope-OrgID header with metrics. Maps to METRICS_PRIMARY_ORG.
  logs_url:
    name: Logs Endpoint URL
    description: Loki push URL. Maps to LOGS_PRIMARY_URL.
  logs_tenant:
    name: Logs Tenant (Org ID)
    description: Loki tenant_id. Maps to LOGS_PRIMARY_ORG.
  cluster_name:
    name: Cluster Label
    description: Value of the "cluster" external label added to every series.
  env:
    name: Env Label
    description: Value of the "env" external label.
  region:
    name: Region Label
    description: Value of the "region" external label.
  instance:
    name: Instance (hostname)
    description: Override the "instance" label on all metrics (e.g. this host's name). Empty keeps the scrape default.
