---
configuration:
  metrics_url:
    name: Metrics Endpoint URL
    description: Prometheus remote_write URL (Mimir / Grafana Cloud). Maps to METRICS_PRIMARY_URL.
  metrics_tenant:
    name: Metrics Tenant (Org ID)
    description: Sent as the X-Scope-OrgID header with metrics. Maps to METRICS_PRIMARY_ORG.
  logs_url:
    name: Logs Endpoint URL
    description: Loki push URL. Maps to LOGS_PRIMARY_URL.
  logs_tenant:
    name: Logs Tenant (Org ID)
    description: Loki tenant_id. Maps to LOGS_PRIMARY_ORG.
  cluster_name:
    name: Cluster Label
    description: Value of the "cluster" external label added to every series.
  env:
    name: Env Label
    description: Value of the "env" external label.
  region:
    name: Region Label
    description: Value of the "region" external label.
  instance:
    name: Instance (hostname)
    description: Override the "instance" label on all metrics (e.g. this host's name). Empty keeps the scrape default.
  enable_unix:
    name: Node Metrics
    description: Collect host node_exporter (unix) metrics.
  enable_process:
    name: Process Metrics
    description: Collect process_exporter metrics.
  enable_docker:
    name: Docker Metrics & Logs
    description: Collect cAdvisor metrics and Docker container logs (needs Protection mode off).
  enable_journal:
    name: Journal Logs
    description: Collect systemd journal logs.
  scrape_exporter:
    name: Scrape Home Assistant Exporter
    description: Scrape the Home Assistant Exporter add-on at :9878.
  scrape_core:
    name: Scrape Home Assistant Core
    description: Scrape Home Assistant core /api/prometheus (no auth; needs the Prometheus integration enabled in HA).
